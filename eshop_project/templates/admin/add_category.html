<!-- templates/admin/add_category.html -->

{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg rounded-4 p-5">

        <h2 class="text-warning fw-bold mb-4 text-center">
            Add New Category
        </h2>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Category Name</label>
                {{ form.name }}
            </div>

            <div class="mb-3">
                <label class="form-label">Slug</label>
                {{ form.slug }}
            </div>

            <div class="mb-3">
                <label class="form-label">Category Image</label>
                {{ form.image }}
            </div>

            <button type="submit"
                    class="btn btn-warning w-100 btn-lg">
                Add Category
            </button>

        </form>

    </div>

</div>

{% endblock content %}
