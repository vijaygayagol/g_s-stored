{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <h2>Search Results for '{{ query }}'</h2>
    <div class="row mt-4">
        {% for product in products %}
        <div class="col-md-3 mb-4">
            <div class="card shadow rounded-4 h-100">
                <img src="{{ product.image.url }}" class="card-img-top" height="250">
                <div class="card-body text-center">
                    <h5>{{ product.name }}</h5>
                    <p>₹{{ product.discounted_price }}</p>
                    <a href="{% url 'product_detail' product.slug %}" class="btn btn-dark">View</a>
                </div>
            </div>
        </div>
        {% empty %}
            <p>No products found.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
